name: ci

on:
  pull_request:
  push:
    branches: "*"

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun
          path: |
            ~/.bun/bin
            ~/.bun/install
            node_modules

      - name: Install dependencies
        run: bun i

      - name: Run linters
        run: bun run lint
