name: cd

on:
  push:
    tags:
      - v*

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: bun run publish
